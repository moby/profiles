name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  project-checks:
    name: Project Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: "stable"

    - name: Install ltag
      run: go install github.com/containerd/ltag@latest

    - name: Run file header checks
      run: ltag --check -t "./script/validate/template" -v

  crossbuild:
    name: Cross Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23", "oldstable", "stable"]

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cross build
      run: make crossbuild

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23", "oldstable", "stable"]

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install AppArmor tools
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq -o Dpkg::Use-Pty=0 apparmor apparmor-utils

    - name: Run tests
      run: make test

    - name: Run tests as root
      env:
        TEST_AS_ROOT: 1
      run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: stable

    - name: golangci-lint (apparmor)
      id: lint-apparmor
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      with:
        version: latest
        working-directory: apparmor
      continue-on-error: true

    - name: golangci-lint (seccomp)
      id: lint-seccomp
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      with:
        version: latest
        working-directory: seccomp
      continue-on-error: true

    - name: Check lint results
      if: steps.lint-apparmor.outcome == 'failure' || steps.lint-seccomp.outcome == 'failure'
      run: |
        echo "One or more lint checks failed"
        exit 1

  check-codegen:
    name: Check seccomp code generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable

      - name: Validate seccomp code generation
        run: make validate-codegen
